version: "3.9"

services:
  usl-disease-api:
    build:
      context: .
      dockerfile: models_dataset1/deployment/Dockerfile
    container_name: usl-disease-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - models_dataset1/deployment/.env.example
    environment:
      MODEL_ARTIFACT_PATH: /app/models_dataset1/csv_models/artifacts/best_model.joblib
    volumes:
      - ./models_dataset1/csv_models/artifacts:/app/models_dataset1/csv_models/artifacts:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
